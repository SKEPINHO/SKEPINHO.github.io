<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MódaStyl – Úvod</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="logo">MódaStyl</div>
    <nav>
      <ul>
        <li><a href="#">Domů</a></li>
        <li><a href="#">O nás</a></li>
        <li><a href="#">Kolekce</a></li>
        <li><a href="#">Kontakt</a></li>
      </ul>
    </nav>
  </header>

  <section class="hero">
    <h1>Objev svůj styl</h1>
    <p>Moderní a pohodlné oblečení pro každý den.</p>
    <a href="#" class="btn">Prozkoumat kolekci</a>
  </section>

  <section class="slider">
    <div class="slides">
      <img src="JS50.png" alt="Jarní výprodej" class="slide active">
      <img src="LTK.png" alt="Letní kolekce" class="slide">
    </div>
    <button class="nav prev">&#10094;</button>
    <button class="nav next">&#10095;</button>
    <div class="dots">
      <span class="dot active"></span>
      <span class="dot"></span>
    </div>
  </section>
  
   <section class="intro">
    <h2>O značce MódaStyl</h2>
    <p>
      Jsme česká značka zaměřená na stylové a udržitelné oblečení. Věříme v kvalitu, jednoduchost a pohodlí.
    </p>
  </section>

  <footer>
    <p>&copy; 2025 MódaStyl. Vyrobeno s láskou k módě.</p>
  </footer>





  <script>
    const slides = document.querySelectorAll('.slide');
    const dots = document.querySelectorAll('.dot');
    const nextBtn = document.querySelector('.next');
    const prevBtn = document.querySelector('.prev');
    const slideContainer = document.querySelector('.slider');
  
    let current = 0;
  
    function showSlide(index) {
      slides.forEach((slide, i) => {
        slide.classList.toggle('active', i === index);
        dots[i].classList.toggle('active', i === index);
      });
    }
  
    function nextSlide() {
      current = (current + 1) % slides.length;
      showSlide(current);
    }
  
    function prevSlide() {
      current = (current - 1 + slides.length) % slides.length;
      showSlide(current);
    }
  
    nextBtn.addEventListener('click', nextSlide);
    prevBtn.addEventListener('click', prevSlide);
  
    dots.forEach((dot, i) => {
      dot.addEventListener('click', () => {
        current = i;
        showSlide(current);
      });
    });
  
    // Automatické přepínání každých 5 sekund
    setInterval(nextSlide, 5000);
  
    // Swipe na mobilu
    let startX = 0;
    slideContainer.addEventListener('touchstart', (e) => {
      startX = e.touches[0].clientX;
    });
  
    slideContainer.addEventListener('touchend', (e) => {
      let endX = e.changedTouches[0].clientX;
      if (startX - endX > 50) nextSlide();
      else if (endX - startX > 50) prevSlide();
    });
  </script>
  

</body>
</html>
